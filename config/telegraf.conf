################################################################################
# Telegraf Agent Configuration (VISR)
################################################################################

[agent]
  interval = "1s"                  # MQTT is event-driven; interval mainly for flush cadence
  flush_interval = "1s"
  round_interval = true
  metric_batch_size = 1000
  metric_buffer_limit = 10000
  collection_jitter = "0s"
  flush_jitter = "0s"
  precision = "1ms"
  hostname = "core"
  omit_hostname = false


################################################################################
# Input: MQTT Consumer
#
# Supported topic formats:
#   visr/sensors/<sensor_type>/<node_id>
#   visr/compute/<metric>/<node_id>
#
# Examples:
#   visr/sensors/gps/core
#   visr/sensors/radiation/uav01
#   visr/compute/cpu/core
#   visr/compute/net/uav01
################################################################################

[[inputs.mqtt_consumer]]
  servers = ["tcp://mosquitto:1883"]

  # Subscribe to both sensor and compute topic families
  topics = [
    "visr/sensors/+/+",
    "visr/compute/+/+"
  ]

  persistent_session = true
  client_id = "telegraf-visr"
  qos = 0
  connection_timeout = "30s"

  data_format = "json"

  # Use timestamp from payload if present
  json_time_key = "ts"
  json_time_format = "2006-01-02T15:04:05.999999999Z07:00"

  # Promote these JSON fields to tags when present
  # (iface/mount/core only appear on certain streams)
  tag_keys = [
    "sensor_id",
    "stream_id",
    "iface",
    "mount",
    "core",
    "profile",
    "interfaces",
    "regulatory_region",
    "service_type",
    "stream_name",
    "peer",
    "frame_type",
    "ifname",
    "keypair",
    "link_domain",
    "version",
    "commit"
  ]

  ##########################################################################
  # sensors: visr/sensors/<sensor_type>/<node_id>
  #
  # Example:
  #   visr/sensors/gps/core
  #   → measurement = gps
  #   → tag: node_id=core
  ##########################################################################
  [[inputs.mqtt_consumer.topic_parsing]]
    topic = "visr/sensors/+/+"
    measurement = "_/_/sensor_type/_"
    tags = "_/_/_/node_id"


  ##########################################################################
  # compute: visr/compute/<metric>/<node_id>
  #
  # Example:
  #   visr/compute/cpu/core
  #   → measurement = cpu
  #   → tag: node_id=core
  ##########################################################################
  [[inputs.mqtt_consumer.topic_parsing]]
    topic = "visr/compute/+/+"
    measurement = "_/_/metric/_"
    tags = "_/_/_/node_id"


################################################################################
# Output: PostgreSQL (Timescale / Postgres)
################################################################################

[[outputs.postgresql]]
  connection = "host=postgres port=5432 user=postgres password=admin dbname=postgres sslmode=disable"